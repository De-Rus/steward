# One command → a populated steward demo:
#   docker compose up
# then open http://localhost:8686 and log in with the credentials below.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: acme
    volumes:
      - ./demo/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme"]
      interval: 2s
      timeout: 3s
      retries: 20

  steward:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      STEWARD_DB: postgres://acme:acme@db:5432/acme
      STEWARD_CONFIG: /demo/admin
      STEWARD_BASE_PATH: /admin
      STEWARD_SECRET_KEY: demo-secret-not-for-production
      STEWARD_SECURE_COOKIES: "false"
      STEWARD_ADMIN_EMAIL: admin
      STEWARD_ADMIN_PASSWORD: admin
    ports:
      - "8686:8686"
